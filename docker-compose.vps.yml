services:
  api:
    build: .
    env_file: .env
    environment:
      - TEMPORAL_HOST=temporal:7233
    ports:
      - "8000:8000"
    networks:
      - temporal-network
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    environment:
      - TEMPORAL_HOST=temporal:7233
    command: ["python", "worker.py"]
    networks:
      - temporal-network
    restart: unless-stopped

networks:
  temporal-network:
    external: true
